server {
    listen 8080;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.supabase.co https://challenges.cloudflare.com; script-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.supabase.co; font-src 'self' https://fonts.gstatic.com;" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Static assets: cache for a long time (safe with Vite hashed filenames)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|ico|svg|ttf|eot)$ {
        expires 1y;
        access_log off;
    }

    # Keep SPA shell fresh on deploy
    location = /index.html {
        expires -1;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logging
    access_log /var/log/nginx/access.log combined;
}

